name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 --decode --ignore-garbage > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Deploy via SSH
        run: |
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /opt/forgeinformatique && git pull origin master && docker compose up -d --build && docker compose ps"
