name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 --decode --ignore-garbage > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Write htpasswd then deploy
        env:
          HTPASSWD_CONTENT: ${{ secrets.HTPASSWD_CONTENT }}
        run: |
          printf '%s\n' "$HTPASSWD_CONTENT" | ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cat > /opt/forgeinformatique/.htpasswd && chmod 644 /opt/forgeinformatique/.htpasswd"

          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /opt/forgeinformatique && git stash && git pull origin master && docker compose up -d --build && docker compose ps"
