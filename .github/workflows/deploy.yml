name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 --decode --ignore-garbage > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Deploy via SSH
        run: |
          ssh -i /tmp/deploy_key `
            -o StrictHostKeyChecking=no `
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} `
            "cd /opt/forgeinformatique && GIT_SSH_COMMAND='ssh -i /root/.ssh/id_github_plexit -o StrictHostKeyChecking=no' git pull origin master && docker compose up -d --build && docker compose ps"